# Adjust app name + region before first deploy.
# `fly launch --copy-config --no-deploy` will help pick a unique name.
app = "youtube-downloader-proxy"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
