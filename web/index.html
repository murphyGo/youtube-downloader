<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>youtube-downloader</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        max-width: 640px;
        margin: 4rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
      p.subtitle { margin-top: 0; opacity: 0.7; }
      form { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 2rem; }
      input[type="url"] {
        padding: 0.6rem 0.75rem;
        font-size: 1rem;
        border: 1px solid currentColor;
        border-radius: 6px;
        background: transparent;
        color: inherit;
      }
      button {
        padding: 0.7rem 1rem;
        font-size: 1rem;
        font-weight: 600;
        border: 0;
        border-radius: 6px;
        background: #c00;
        color: white;
        cursor: pointer;
      }
      button:disabled { background: #888; cursor: not-allowed; }
      .status { min-height: 1.5em; opacity: 0.85; }
    </style>
  </head>
  <body>
    <h1>youtube-downloader</h1>
    <p class="subtitle">Paste a YouTube video or Shorts URL. The proxy resolves it and the file downloads.</p>

    <form id="form">
      <input id="url" type="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" />
      <button id="submit" type="submit">Download</button>
      <div class="status" id="status"></div>
    </form>
  </body>
</html>
