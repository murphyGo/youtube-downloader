<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>youtube-downloader</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        max-width: 640px;
        margin: 4rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
      p.subtitle { margin-top: 0; opacity: 0.7; }
      form { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 2rem; }
      input[type="url"] {
        padding: 0.6rem 0.75rem;
        font-size: 1rem;
        border: 1px solid currentColor;
        border-radius: 6px;
        background: transparent;
        color: inherit;
      }
      button {
        padding: 0.7rem 1rem;
        font-size: 1rem;
        font-weight: 600;
        border: 0;
        border-radius: 6px;
        background: #c00;
        color: white;
        cursor: pointer;
      }
      button:disabled { background: #888; cursor: not-allowed; }
      .status { min-height: 1.5em; opacity: 0.85; }
    </style>
  </head>
  <body>
    <h1>youtube-downloader</h1>
    <p class="subtitle">Paste a YouTube video or Shorts URL. The proxy resolves it and the file downloads.</p>

    <form id="form">
      <input id="url" type="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" />
      <button id="submit" type="submit" disabled>Download</button>
      <div class="status" id="status"></div>
    </form>

    <script>
      // Replace the production host with your deployed Fly app URL after `fly deploy`.
      const PROXY_HOST = (location.hostname === "localhost" || location.hostname === "127.0.0.1")
        ? "http://127.0.0.1:8080"
        : "https://CHANGE-ME.fly.dev";

      const ALLOWED_HOSTS = new Set([
        "youtube.com",
        "www.youtube.com",
        "m.youtube.com",
        "youtu.be",
        "youtube-nocookie.com",
        "www.youtube-nocookie.com",
      ]);

      function isYouTubeUrl(value) {
        let u;
        try {
          u = new URL(value);
        } catch {
          return false;
        }
        if (u.protocol !== "http:" && u.protocol !== "https:") return false;
        return ALLOWED_HOSTS.has(u.hostname.toLowerCase());
      }

      const input = document.getElementById("url");
      const submit = document.getElementById("submit");
      const status = document.getElementById("status");

      function refresh() {
        const value = input.value.trim();
        const valid = value.length > 0 && isYouTubeUrl(value);
        submit.disabled = !valid;
        if (value.length === 0) {
          status.textContent = "";
        } else if (!valid) {
          status.textContent = "Enter a YouTube video or Shorts URL.";
        } else {
          status.textContent = "";
        }
      }

      input.addEventListener("input", refresh);

      document.getElementById("form").addEventListener("submit", (e) => {
        e.preventDefault();
        const value = input.value.trim();
        if (!isYouTubeUrl(value)) return;
        const target = `${PROXY_HOST}/download?url=${encodeURIComponent(value)}`;
        status.textContent = "Downloading… your browser will prompt to save the file.";
        window.location.href = target;
      });

      refresh();
    </script>
  </body>
</html>
